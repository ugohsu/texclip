<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEX·VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --border: #d4cfc6;
    --text: #1a1814;
    --text2: #5a5550;
    --accent: #2d5a8e;
    --accent2: #c4581a;
    --code-bg: #1e1c18;
    --code-text: #e8e4dc;
    --ok: #2e7d32;
    --err: #b71c1c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: var(--bg);
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    height: 50px;
    flex-shrink: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    white-space: nowrap;
    margin-right: 0.5rem;
  }
  .logo span { color: #88aacc; }
  .sep { flex: 1; }
  .vsep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); margin: 0 0.2rem; }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.7rem;
    border: 1.5px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    white-space: nowrap;
    background: transparent;
  }
  .btn-ghost { border-color: rgba(245,242,236,0.3); color: var(--bg); }
  .btn-ghost:hover { background: rgba(245,242,236,0.1); border-color: rgba(245,242,236,0.6); }
  .btn-ghost.active { border-color: rgba(245,242,236,0.85); background: rgba(245,242,236,0.15); }
  .btn-danger {
    border-color: rgba(183,28,28,0.5); color: rgba(255,160,160,0.9);
  }
  .btn-danger:hover { background: rgba(183,28,28,0.15); border-color: rgba(255,120,120,0.8); }
  .btn-danger:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  /* ── Workspace ── */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Left panel ── */
  #left-panel {
    width: 400px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1.5px solid var(--border);
    background: var(--surface2);
    overflow: hidden;
    transition: width 0.2s;
  }
  body.preview-only #left-panel { width: 0; border: none; overflow: hidden; }

  /* Entry list */
  .entry-list {
    flex-shrink: 0;
    max-height: 160px;
    overflow-y: auto;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface);
  }
  .entry-list-empty {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text2);
    padding: 0.8rem 1rem;
    font-style: italic;
  }
  .entry-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.8rem 0.45rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    min-width: 0;
  }
  .entry-item:last-child { border-bottom: none; }
  .entry-item:hover { background: var(--surface2); }
  .entry-item.active { background: var(--accent); color: #fff; }
  .entry-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
  }
  .entry-item.active .entry-num { color: rgba(255,255,255,0.65); }
  .entry-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .entry-item.active .entry-label { color: #fff; }
  .entry-badge {
    font-size: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
    padding: 0.1em 0.4em;
    flex-shrink: 0;
    color: var(--text2);
  }
  .entry-item.active .entry-badge { background: rgba(255,255,255,0.2); color: #fff; }
  .entry-badge.ok { background: rgba(46,125,50,0.12); color: var(--ok); }
  .entry-item.active .entry-badge.ok { background: rgba(255,255,255,0.25); color: #fff; }

  /* Editor section */
  .editor-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  #tex-input {
    flex: 1;
    width: 100%;
    min-height: 0;
    padding: 1rem 1.1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.75;
    background: var(--code-bg);
    color: var(--code-text);
    border: none;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  #tex-input::placeholder { color: rgba(232,228,220,0.28); font-style: italic; }
  #tex-input:disabled { opacity: 0.4; }

  .controls-bar {
    display: flex;
    gap: 0.4rem;
    padding: 0.55rem 0.75rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
    flex-wrap: wrap;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 0.28rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }
  select:disabled { opacity: 0.4; }

  .controls-spacer { flex: 1; }

  .btn-sm {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.3rem 0.65rem;
    border: 1.5px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    white-space: nowrap;
  }
  .btn-sm-ghost { border-color: var(--border); color: var(--text2); }
  .btn-sm-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-sm-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm-accent:hover { opacity: 0.85; }
  .btn-sm-accent:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  .btn-sm.flashed { background: var(--ok) !important; border-color: var(--ok) !important; color: #fff !important; }

  /* ── Right panel ── */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  #preview-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    min-height: 60px;
  }

  #preview-empty {
    text-align: center;
    color: var(--text2);
  }
  #preview-empty .icon { font-size: 2.5rem; opacity: 0.1; display: block; margin-bottom: 0.8rem; }
  #preview-empty p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    line-height: 2;
    color: var(--text2);
  }
  #preview-empty code {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.1em 0.4em;
    font-size: 0.88em;
  }

  #preview-svg {
    display: none;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    overflow: auto;
  }
  #preview-svg svg {
    max-width: 90%;
    max-height: 90%;
    display: block;
  }

  #preview-loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    color: var(--text2);
  }
  #preview-loading.active { display: flex; }
  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #preview-loading span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.76rem;
    letter-spacing: 0.05em;
  }

  /* ── Log panel ── */
  .log-resizer {
    height: 5px;
    background: var(--border);
    cursor: ns-resize;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .log-resizer:hover, .log-resizer.dragging { background: var(--accent); }

  #log-panel {
    display: none;
    flex-direction: column;
    flex-shrink: 0;
    height: 200px;
    min-height: 40px;
    overflow: hidden;
    border-top: none;
    background: var(--code-bg);
  }
  #log-panel.visible { display: flex; }

  .log-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.85rem;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .log-header-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(232,228,220,0.45);
  }
  .log-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 0.1em 0.5em;
    border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .log-badge.ok  { background: rgba(46,125,50,0.3);  color: #81c784; }
  .log-badge.err { background: rgba(183,28,28,0.3);  color: #ef9a9a; }

  #log-content {
    flex: 1;
    overflow: auto;
    padding: 0.75rem 1rem;
  }
  #log-content pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.74rem;
    line-height: 1.6;
    color: rgba(232,228,220,0.75);
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
  }
  #log-panel.has-error #log-content pre { color: #ef9a9a; }

  /* Action bar */
  .action-bar {
    border-top: 1.5px solid var(--border);
    padding: 0.55rem 0.85rem;
    display: flex;
    gap: 0.4rem;
    align-items: center;
    flex-shrink: 0;
    background: var(--surface2);
    flex-wrap: wrap;
  }
  .action-bar .status-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    margin-left: auto;
    opacity: 0.6;
  }
  .action-bar .status-msg.ok { color: var(--ok); opacity: 1; }
  .action-bar .status-msg.err { color: var(--err); opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">TEX<span>·</span>VIEWER</div>
  <button class="btn btn-ghost" id="btn-add" title="新規エントリを追加">+ New</button>
  <button class="btn btn-danger" id="btn-delete" disabled title="アクティブなエントリを削除">Delete</button>
  <div class="sep"></div>
  <div class="vsep"></div>
  <button class="btn btn-ghost active" id="btn-split">Split</button>
  <button class="btn btn-ghost" id="btn-preview">Preview</button>
</header>

<div class="workspace">

  <!-- Left panel -->
  <div id="left-panel">

    <!-- Entry list -->
    <div class="entry-list" id="entry-list">
      <div class="entry-list-empty">エントリなし — "+ New" で追加</div>
    </div>

    <!-- Editor -->
    <div class="editor-section">
      <textarea id="tex-input" spellcheck="false" disabled
        placeholder="LaTeX を入力してください。&#10;&#10;例 (--math モード):&#10;\int_0^\infty e^{-x^2} dx = \frac{\sqrt{\pi}}{2}"></textarea>
      <div class="controls-bar">
        <select id="mode-select" disabled title="入力モード">
          <option value="math">--math (数式本文)</option>
          <option value="body">--body (document 本文)</option>
          <option value="full">--full (完全な .tex)</option>
        </select>
        <select id="engine-select" disabled title="タイプセットエンジン">
          <option value="lualatex">lualatex</option>
          <option value="uplatex">uplatex</option>
        </select>
        <div class="controls-spacer"></div>
        <input type="file" id="file-input" accept=".tex,.txt" style="display:none">
        <button class="btn-sm btn-sm-ghost" id="btn-open" disabled>Open…</button>
        <button class="btn-sm btn-sm-ghost" id="btn-save" disabled>Save .tex</button>
        <button class="btn-sm btn-sm-accent" id="btn-typeset" disabled>Typeset ▶</button>
      </div>
    </div>

  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <div id="preview-area">
      <div id="preview-empty">
        <span class="icon">∫</span>
        <p>
          "+ New" でエントリを追加し、<br>
          LaTeX を入力して <code>Typeset ▶</code> を押してください。
        </p>
      </div>
      <div id="preview-loading">
        <div class="spinner"></div>
        <span>タイプセット中…</span>
      </div>
      <div id="preview-svg"></div>
    </div>

    <div class="log-resizer" id="log-resizer" style="display:none"></div>

    <div id="log-panel">
      <div class="log-header">
        <span class="log-header-title">LaTeX Log</span>
        <span class="log-badge" id="log-badge"></span>
      </div>
      <div id="log-content"><pre id="log-pre"></pre></div>
    </div>

    <div class="action-bar">
      <button class="btn-sm btn-sm-ghost" id="btn-copy-svg" disabled>SVG コピー</button>
      <button class="btn-sm btn-sm-ghost" id="btn-copy-png" disabled>PNG コピー (高解像度)</button>
      <button class="btn-sm btn-sm-ghost" id="btn-dl-pdf" disabled>PDF ↓</button>
      <button class="btn-sm btn-sm-ghost" id="btn-dl-svg" disabled>SVG ↓</button>
      <span class="status-msg" id="status-msg"></span>
    </div>
  </div>

</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────

const state = {
  entries: [],   // [{num, source, mode, engine, resultId, svg, label}]
  active: -1,
  nextNum: 1,
};

// ── DOM refs ───────────────────────────────────────────────────────

const elEntryList  = document.getElementById('entry-list');
const elTexInput   = document.getElementById('tex-input');
const elModeSelect = document.getElementById('mode-select');
const elEngSelect  = document.getElementById('engine-select');
const elBtnAdd     = document.getElementById('btn-add');
const elBtnDelete  = document.getElementById('btn-delete');
const elBtnTypeset = document.getElementById('btn-typeset');
const elBtnOpen    = document.getElementById('btn-open');
const elBtnSave    = document.getElementById('btn-save');
const elFileInput  = document.getElementById('file-input');
const elBtnCopySvg = document.getElementById('btn-copy-svg');
const elBtnCopyPng = document.getElementById('btn-copy-png');
const elBtnDlPdf   = document.getElementById('btn-dl-pdf');
const elBtnDlSvg   = document.getElementById('btn-dl-svg');
const elStatusMsg  = document.getElementById('status-msg');
const elPreviewEmpty   = document.getElementById('preview-empty');
const elPreviewLoading = document.getElementById('preview-loading');
const elPreviewSvg     = document.getElementById('preview-svg');
const elLogPanel       = document.getElementById('log-panel');
const elLogBadge       = document.getElementById('log-badge');
const elLogPre         = document.getElementById('log-pre');
const elLogResizer     = document.getElementById('log-resizer');

// ── Entry management ───────────────────────────────────────────────

function saveActiveEditorState() {
  if (state.active < 0) return;
  const e = state.entries[state.active];
  e.source = elTexInput.value;
  e.mode   = elModeSelect.value;
  e.engine = elEngSelect.value;
}

function addEntry() {
  saveActiveEditorState();
  state.entries.push({
    num: state.nextNum++,
    source: '',
    mode: 'math',
    engine: 'lualatex',
    resultId: null,
    svg: null,
    log: null,
    logOk: null,
    label: '',
  });
  state.active = state.entries.length - 1;
  renderAll();
  elTexInput.focus();
}

function deleteActiveEntry() {
  if (state.active < 0) return;
  state.entries.splice(state.active, 1);
  state.active = Math.min(state.active, state.entries.length - 1);
  renderAll();
}

function switchEntry(i) {
  if (i === state.active) return;
  saveActiveEditorState();
  state.active = i;
  renderAll();
}

// ── Render ─────────────────────────────────────────────────────────

function renderEntryList() {
  if (state.entries.length === 0) {
    elEntryList.innerHTML = '<div class="entry-list-empty">エントリなし — "+ New" で追加</div>';
    return;
  }
  elEntryList.innerHTML = '';
  state.entries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'entry-item' + (i === state.active ? ' active' : '');
    item.onclick = () => switchEntry(i);

    const num = document.createElement('span');
    num.className = 'entry-num';
    num.textContent = '#' + e.num;

    const label = document.createElement('span');
    label.className = 'entry-label';
    label.textContent = e.label || e.source.trim().split('\n')[0].slice(0, 30) || '(空)';

    const badge = document.createElement('span');
    badge.className = 'entry-badge' + (e.resultId ? ' ok' : '');
    badge.textContent = e.engine === 'lualatex' ? 'lua' : 'up';

    item.append(num, label, badge);
    elEntryList.appendChild(item);
  });
}

function renderEditor() {
  const hasEntry = state.active >= 0;
  elTexInput.disabled   = !hasEntry;
  elModeSelect.disabled = !hasEntry;
  elEngSelect.disabled  = !hasEntry;
  elBtnTypeset.disabled = !hasEntry;
  elBtnDelete.disabled  = !hasEntry;
  elBtnOpen.disabled    = !hasEntry;
  elBtnSave.disabled    = !hasEntry;

  if (!hasEntry) {
    elTexInput.value   = '';
    elModeSelect.value = 'math';
    elEngSelect.value  = 'lualatex';
    return;
  }
  const e = state.entries[state.active];
  elTexInput.value   = e.source;
  elModeSelect.value = e.mode;
  elEngSelect.value  = e.engine;
}

function renderPreview() {
  const e = state.active >= 0 ? state.entries[state.active] : null;
  const hasResult = e && e.resultId && e.svg;

  // SVG preview
  elPreviewEmpty.style.display = (!e || !hasResult) && !isLoading() ? '' : 'none';
  elPreviewSvg.style.display   = hasResult && !isLoading() ? 'flex' : 'none';

  if (hasResult) {
    const tmp = document.createElement('div');
    tmp.innerHTML = e.svg;
    const svgEl = tmp.querySelector('svg');
    if (svgEl) {
      svgEl.removeAttribute('width');
      svgEl.removeAttribute('height');
    }
    elPreviewSvg.innerHTML = tmp.innerHTML;
  }

  // Log panel
  if (e && e.log != null) {
    showLog(e.log, e.logOk);
  } else {
    elLogPanel.classList.remove('visible');
    elLogResizer.style.display = 'none';
  }

  // Action buttons
  elBtnCopySvg.disabled = !hasResult;
  elBtnCopyPng.disabled = !hasResult;
  elBtnDlPdf.disabled   = !hasResult;
  elBtnDlSvg.disabled   = !hasResult;
}

function renderAll() {
  renderEntryList();
  renderEditor();
  renderPreview();
}

let _loading = false;
function isLoading() { return _loading; }

function setLoading(v) {
  _loading = v;
  elPreviewLoading.classList.toggle('active', v);
  elBtnTypeset.disabled = v || state.active < 0;
  if (v) {
    elPreviewEmpty.style.display = 'none';
    elPreviewSvg.style.display = 'none';
  }
}

function showLog(text, ok) {
  elLogPre.textContent = text || '';
  elLogBadge.textContent = ok ? 'OK' : 'ERROR';
  elLogBadge.className   = 'log-badge ' + (ok ? 'ok' : 'err');
  elLogPanel.classList.toggle('has-error', !ok);
  elLogPanel.classList.add('visible');
  elLogResizer.style.display = '';
  // エラー時はログ末尾にスクロール
  if (!ok) {
    requestAnimationFrame(() => {
      const c = document.getElementById('log-content');
      c.scrollTop = c.scrollHeight;
    });
  }
}

function setStatus(msg, cls) {
  elStatusMsg.textContent = msg;
  elStatusMsg.className   = 'status-msg' + (cls ? ' ' + cls : '');
}

// ── Typeset ────────────────────────────────────────────────────────

async function typeset() {
  if (state.active < 0) return;
  saveActiveEditorState();
  const e = state.entries[state.active];

  if (!e.source.trim()) {
    setStatus('LaTeX が空です。', 'err');
    return;
  }

  setLoading(true);
  setStatus('');

  try {
    const res = await fetch('/typeset', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({source: e.source, mode: e.mode, engine: e.engine}),
    });
    const data = await res.json();

    setLoading(false);

    if (data.ok) {
      e.resultId = data.id;
      e.svg      = data.svg;
      e.log      = data.log || '';
      e.logOk    = true;
      if (!e.label) {
        e.label = e.source.trim().split('\n')[0].slice(0, 24);
      }
      renderEntryList();
      renderPreview();
      setStatus('完了', 'ok');
    } else {
      e.resultId = null;
      e.svg      = null;
      e.log      = data.log || 'タイプセットに失敗しました。';
      e.logOk    = false;
      renderPreview();
      setStatus('エラー', 'err');
    }
  } catch (err) {
    setLoading(false);
    const e = state.entries[state.active];
    if (e) {
      e.log   = 'サーバーとの通信に失敗しました。\n' + err.toString();
      e.logOk = false;
      renderPreview();
    }
    setStatus('通信エラー', 'err');
  }
}

// ── Copy ───────────────────────────────────────────────────────────

async function copySvg() {
  const e = state.entries[state.active];
  if (!e || !e.resultId) return;
  setStatus('コピー中…', '');
  try {
    const res = await fetch(`/copy/${e.resultId}/svg`, {method: 'POST'});
    const data = await res.json();
    if (data.ok) {
      flash(elBtnCopySvg);
      setStatus('SVG をコピーしました', 'ok');
    } else {
      setStatus('コピー失敗: ' + (data.msg || ''), 'err');
    }
  } catch (err) {
    setStatus('通信エラー', 'err');
  }
}

async function copyPng() {
  const e = state.entries[state.active];
  if (!e || !e.resultId) return;
  setStatus('コピー中…', '');
  try {
    const res = await fetch(`/copy/${e.resultId}/png`, {method: 'POST'});

      flash(elBtnCopyPng);
      setStatus('PNG をコピーしました', 'ok');
    } else {
      setStatus('コピー失敗: ' + (data.msg || ''), 'err');
    }

  }
}

// ── File open / save ───────────────────────────────────────────────

function openFile() {
  elFileInput.value = '';
  elFileInput.click();
}

elFileInput.addEventListener('change', () => {
  const file = elFileInput.files[0];
  if (!file || state.active < 0) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const e = state.entries[state.active];
    e.source = ev.target.result;
    elTexInput.value = e.source;
    if (!e.label) {
      e.label = file.name.replace(/\.(tex|txt)$/i, '').slice(0, 24);
      renderEntryList();
    }
    setStatus(file.name + ' を読み込みました', 'ok');
  };
  reader.readAsText(file);
});

function saveTeX() {
  if (state.active < 0) return;
  saveActiveEditorState();
  const e = state.entries[state.active];
  if (!e.source.trim()) { setStatus('内容が空です。', 'err'); return; }
  const filename = (e.label || `entry_${e.num}`) + '.tex';
  const blob = new Blob([e.source], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus(filename + ' を保存しました', 'ok');
}

function flash(btn) {
  btn.classList.add('flashed');
  setTimeout(() => btn.classList.remove('flashed'), 1200);
}

// ── Download ───────────────────────────────────────────────────────

function download(fmt) {
  const e = state.entries[state.active];
  if (!e || !e.resultId) return;
  const a = document.createElement('a');
  a.href = `/download/${e.resultId}/${fmt}`;
  a.download = `output.${fmt}`;
  a.click();
}

// ── View modes ─────────────────────────────────────────────────────

document.getElementById('btn-split').onclick = function () {
  document.body.classList.remove('preview-only');
  this.classList.add('active');
  document.getElementById('btn-preview').classList.remove('active');
};
document.getElementById('btn-preview').onclick = function () {
  document.body.classList.add('preview-only');
  this.classList.add('active');
  document.getElementById('btn-split').classList.remove('active');
};

// ── Event bindings ─────────────────────────────────────────────────

elBtnAdd.onclick    = addEntry;
elBtnDelete.onclick = deleteActiveEntry;
elBtnTypeset.onclick = typeset;
elBtnOpen.onclick   = openFile;
elBtnSave.onclick   = saveTeX;
elBtnCopySvg.onclick = copySvg;
elBtnCopyPng.onclick = copyPng;
elBtnDlPdf.onclick  = () => download('pdf');
elBtnDlSvg.onclick  = () => download('svg');

// Ctrl+Enter でタイプセット
elTexInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    typeset();
  }
});

// ── Log panel resizer ──────────────────────────────────────────────
{
  let dragging = false;
  let startY = 0;
  let startH = 0;

  elLogResizer.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = elLogPanel.offsetHeight;
    elLogResizer.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ns-resize';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startY - e.clientY;  // 上にドラッグ → ログ拡大
    const newH = Math.max(40, Math.min(startH + delta, window.innerHeight - 200));
    elLogPanel.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    elLogResizer.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
}

// ── Init ───────────────────────────────────────────────────────────

addEntry();
</script>
